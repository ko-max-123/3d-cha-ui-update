<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D CAPTCHA 実験</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      width: 100%;
      height: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    body.model-active {
      position: fixed;
      inset: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    body.post-survey-active {
      position: fixed;
      inset: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }
    #container {
      width: 100vw;
      height: 100dvh;
      max-width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .pre-screen,
    #start-screen {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      overflow: auto;
    }
    .panel {
      width: min(92vw, 520px);
      text-align: left;
    }
    .panel h1 {
      font-size: 1.5rem;
      margin: 0 0 16px;
      text-align: center;
    }
    .panel p {
      line-height: 1.6;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 14px 0;
    }
    .field label {
      font-weight: bold;
    }
    select {
      touch-action: manipulation;
      font-size: 1rem;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: #fff;
    }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: normal;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .radio-group input {
      width: auto;
      margin: 0;
    }
    .status-message {
      min-height: 1.4em;
      font-size: 0.95rem;
      color: #555;
      text-align: center;
    }
    .status-message.error {
      color: #c62828;
    }
    #start-screen,
    #survey-screen,
    #post-survey-screen {
      display: none;
    }
    #post-survey-screen.pre-screen {
      justify-content: flex-start;
      align-items: stretch;
      height: 100dvh;
      min-height: 0;
      padding: 0 24px max(48px, calc(env(safe-area-inset-bottom) + 32px));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #postSurveyForm {
      flex: 0 0 auto;
      margin: 0 auto;
      padding-top: max(72px, calc(env(safe-area-inset-top) + 56px));
      padding-bottom: 32px;
    }
    #main-screen {
      display: none;
      flex-direction: column;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }
    #threejs-container {
      position: relative;
      width: 100vw;
      height: 60vh;
      height: 60dvh;
      background: #000;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
    }
    #threejs-container canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    #input-area {
      height: 40vh;
      height: 40dvh;
      width: 100vw;
      max-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 10px 12px max(12px, env(safe-area-inset-bottom));
      box-sizing: border-box;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    h2 {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }
    #result {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
      display: none;
    }
    #correctAnswer {
      font-size: 1rem;
      color: red;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }
    input, textarea {
      touch-action: manipulation;
      font-size: 1rem;
      padding: 10px;
      width: 80%;
      max-width: 300px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin: 8px 0;
      box-sizing: border-box;
      text-align: center;
    }
    #userInput {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: 0;
      border: 0;
    }
    .answer-display {
      min-height: 34px;
      width: 80%;
      max-width: 320px;
      padding: 6px 12px;
      margin: 2px auto 4px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      background: #fff;
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-align: center;
      flex: 0 0 auto;
    }
    .letter-keypad {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 4px;
      width: min(96vw, 360px);
      margin: 4px auto;
      flex: 0 0 auto;
    }
    .letter-keypad button {
      min-width: 0;
      min-height: 30px;
      margin: 0;
      padding: 4px 0;
      border: 1px solid #ccc;
      background: #f8f8f8;
      color: #111;
      font-size: 0.85rem;
      font-weight: bold;
    }
    #deleteCharButton {
      grid-column: span 2;
    }
    #submitButton {
      flex: 0 0 auto;
      width: min(92vw, 320px);
      min-height: 44px;
      margin: 2px 0 6px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .rotation-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8px;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
    }
    .rotation-controls button {
      min-width: 56px;
      min-height: 40px;
      margin: 0;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      font-weight: bold;
      touch-action: manipulation;
    }
    .zoom-controls {
      position: absolute;
      left: max(8px, env(safe-area-inset-left));
      top: max(8px, env(safe-area-inset-top));
      z-index: 2;
      display: flex;
      gap: 8px;
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
    }
    .zoom-controls button {
      min-width: 56px;
      min-height: 44px;
      margin: 0;
      padding: 0 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      font-size: 1.1rem;
      font-weight: bold;
      touch-action: manipulation;
    }
    .vertical-rotation-controls {
      position: absolute;
      right: max(8px, env(safe-area-inset-right));
      top: 50%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateY(-50%);
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
    }
    .vertical-rotation-controls button {
      min-width: 56px;
      min-height: 44px;
      margin: 0;
      padding: 0 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      font-size: 1.1rem;
      font-weight: bold;
      touch-action: manipulation;
    }
    .radio-group input {
      width: auto;
      max-width: none;
      padding: 0;
      margin: 0;
    }
    textarea {
      height: 100px;
    }
    @media (max-width: 600px) {
      #threejs-container {
        height: 52vh;
        height: 52dvh;
      }
      #input-area {
        height: 48vh;
        height: 48dvh;
        padding: 6px 10px max(10px, env(safe-area-inset-bottom));
      }
      #instruction {
        font-size: 0.95rem;
        line-height: 1.3;
        margin: 2px 0;
        flex: 0 0 auto;
      }
      .answer-display {
        width: min(92vw, 320px);
        min-height: 32px;
        padding: 4px 10px;
        font-size: 1.15rem;
      }
      .letter-keypad {
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 5px;
        width: min(94vw, 360px);
      }
      .letter-keypad button {
        min-height: 38px;
        font-size: 0.9rem;
        padding: 4px 0;
      }
      .rotation-controls {
        bottom: max(8px, env(safe-area-inset-bottom));
        gap: 6px;
      }
      .rotation-controls button {
        min-width: 0;
        width: 64px;
        min-height: 38px;
        font-size: 0.95rem;
      }
      .zoom-controls {
        left: max(6px, env(safe-area-inset-left));
        top: max(6px, env(safe-area-inset-top));
        gap: 6px;
      }
      .zoom-controls button {
        min-width: 50px;
        min-height: 40px;
        font-size: 1rem;
      }
      #autoRotateButton {
        width: 96px;
      }
      .vertical-rotation-controls {
        right: max(6px, env(safe-area-inset-right));
        gap: 8px;
      }
      .vertical-rotation-controls button {
        min-width: 56px;
        min-height: 42px;
      }
    }
    @media (max-height: 700px) {
      #threejs-container {
        height: 48vh;
        height: 48dvh;
      }
      #input-area {
        height: 52vh;
        height: 52dvh;
      }
      .letter-keypad button {
        min-height: 34px;
      }
      .rotation-controls button {
        min-height: 34px;
      }
      .zoom-controls button {
        min-width: 46px;
        min-height: 36px;
      }
      .vertical-rotation-controls button {
        min-width: 56px;
        min-height: 38px;
      }
      #submitButton {
        min-height: 40px;
      }
    }
    button {
      touch-action: manipulation;
      font-size: 1rem;
      padding: 8px 16px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin: 8px 0;
      min-width: 100px;
      width: auto;
    }
    button:hover {
      background-color: #0056b3;
    }
    .link-button {
      display: inline-block;
      font-size: 0.95rem;
      color: #007bff;
      text-decoration: none;
      margin-top: 10px;
    }
    .link-button:hover {
      text-decoration: underline;
    }
    #feedback,
    #finishButton,
    #practiceContinueButton,
    #result,
    #correctAnswer {
      display: none;
    }
    #postSurveyComment {
      max-width: 100%;
      height: 120px;
      text-align: left;
    }
    #thank-you {
      display: none;
      width: 100vw;
      height: 100dvh;
      background-color: #ffffff;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
    }
  </style>
  <script type="module" crossorigin src="./assets/main-BS6J9kLs.js"></script>
</head>
<body>
  <div id="container">
    <div id="consent-screen" class="pre-screen">
      <div class="panel">
        <h1>研究アンケート</h1>
        <p>
          このアンケートは、スマートフォン上で3D CAPTCHAをどのように操作するかを調査するためのものです。
          年代などの回答、テスト条件、認証結果、所要時間を研究分析のために記録します。
        </p>
        <p>
          アンケート回答とテスト結果の記録に同意いただける場合のみ、次へ進んでください。
        </p>
        <div style="text-align: center;">
          <button id="agreeButton" type="button">同意する</button>
        </div>
      </div>
    </div>

    <div id="survey-screen" class="pre-screen">
      <form id="surveyForm" class="panel">
        <h1>参加者アンケート</h1>
        <div class="field">
          <label for="ageGroup">年代</label>
          <select id="ageGroup" name="ageGroup" required>
            <option value="">選択してください</option>
            <option value="under_20">20歳未満</option>
            <option value="20s">20代</option>
            <option value="30s">30代</option>
            <option value="40s">40代</option>
            <option value="50s">50代</option>
            <option value="60_or_over">60歳以上</option>
            <option value="prefer_not_to_answer">回答しない</option>
          </select>
        </div>
        <div class="field">
          <label for="gender">性別</label>
          <select id="gender" name="gender" required>
            <option value="">選択してください</option>
            <option value="female">女性</option>
            <option value="male">男性</option>
            <option value="non_binary">ノンバイナリー</option>
            <option value="prefer_not_to_answer">回答しない</option>
          </select>
        </div>
        <div class="field">
          <label for="smartphoneExperience">スマホ操作歴</label>
          <select id="smartphoneExperience" name="smartphoneExperience" required>
            <option value="">選択してください</option>
            <option value="less_than_1_year">1年未満</option>
            <option value="1_to_3_years">1年以上3年未満</option>
            <option value="3_to_5_years">3年以上5年未満</option>
            <option value="5_to_10_years">5年以上10年未満</option>
            <option value="10_or_more_years">10年以上</option>
          </select>
        </div>
        <div class="field">
          <label for="gameExperience">ゲーム経験歴</label>
          <select id="gameExperience" name="gameExperience" required>
            <option value="">選択してください</option>
            <option value="none">なし</option>
            <option value="rarely">ほとんどない</option>
            <option value="sometimes">時々ある</option>
            <option value="often">よくある</option>
            <option value="daily">毎日</option>
          </select>
        </div>
        <div style="text-align: center;">
          <button id="surveySubmitButton" type="submit">アンケート入力完了</button>
        </div>
        <div id="surveyStatus" class="status-message"></div>
      </form>
    </div>

    <div id="start-screen">
      <div style="text-align: center;">
        <button id="startButton">開始</button>
        <br />
        <!-- <a class="link-button" href="./analyzer.html" hidden>操作ログを解析</a> -->
      </div>
    </div>

    <div id="main-screen">
      <div id="threejs-container">
        <div class="zoom-controls" aria-label="拡大縮小操作">
          <button type="button" id="zoomOutButton">−</button>
          <button type="button" id="zoomInButton">＋</button>
        </div>
        <div class="rotation-controls" aria-label="回転操作">
          <button type="button" id="rotateLeftButton">←</button>
          <button type="button" id="autoRotateButton">自動回転</button>
          <button type="button" id="rotateRightButton">→</button>
        </div>
        <div class="vertical-rotation-controls" aria-label="上下回転操作">
          <button type="button" id="rotateUpButton">↑</button>
          <button type="button" id="rotateDownButton">↓</button>
        </div>
      </div>
      <div id="input-area">
        <h2 id="instruction">見えた文字を入力してください</h2>
        <input type="text" id="userInput" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text" readonly />
        <div id="answerDisplay" class="answer-display" aria-live="polite"></div>
        <button id="submitButton">送信</button>
        <div id="letterKeypad" class="letter-keypad" aria-label="文字入力ボタン">
          <button type="button" data-char="A">A</button>
          <button type="button" data-char="B">B</button>
          <button type="button" data-char="C">C</button>
          <button type="button" data-char="D">D</button>
          <button type="button" data-char="E">E</button>
          <button type="button" data-char="F">F</button>
          <button type="button" data-char="G">G</button>
          <button type="button" data-char="H">H</button>
          <button type="button" data-char="K">K</button>
          <button type="button" data-char="L">L</button>
          <button type="button" data-char="M">M</button>
          <button type="button" data-char="N">N</button>
          <button type="button" data-char="O">O</button>
          <button type="button" data-char="P">P</button>
          <button type="button" data-char="R">R</button>
          <button type="button" data-char="S">S</button>
          <button type="button" data-char="T">T</button>
          <button type="button" data-char="U">U</button>
          <button type="button" data-char="V">V</button>
          <button type="button" data-char="W">W</button>
          <button type="button" data-char="X">X</button>
          <button type="button" data-char="Y">Y</button>
          <button type="button" data-char="Z">Z</button>
          <button type="button" id="deleteCharButton">1文字削除</button>
        </div>
        <button id="practiceContinueButton" type="button">本題へ進む</button>
        <div id="result"></div>
        <div id="correctAnswer"></div>
        <textarea id="feedback" placeholder="任意の感想"></textarea>
        <button id="finishButton">終了</button>
      </div>
    </div>

    <div id="post-survey-screen" class="pre-screen">
      <form id="postSurveyForm" class="panel">
        <h1>テスト後アンケート</h1>
        <div id="postSurveyStatus" class="status-message"></div>
        <div class="field">
          <label for="approachability">このテストはどの程度取り組みやすいと思いましたか？</label>
          <select id="approachability" name="approachability" required>
            <option value="">選択してください</option>
            <option value="5">5（取り組みやすい）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（取り組みにくい）</option>
          </select>
        </div>
        <div class="field">
          <label for="fun">このテストは楽しいと思いますか？</label>
          <select id="fun" name="fun" required>
            <option value="">選択してください</option>
            <option value="5">5（楽しい）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（楽しくない）</option>
          </select>
        </div>
        <div class="field">
          <label for="difficulty">このテストの難易度はどの程度でしたか？</label>
          <select id="difficulty" name="difficulty" required>
            <option value="">選択してください</option>
            <option value="5">5（簡単）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（難しい）</option>
          </select>
        </div>
        <div class="field">
          <label>このテストにストレスは感じましたか？</label>
          <div class="radio-group">
            <label><input type="radio" name="stress" value="yes" required />yes</label>
            <label><input type="radio" name="stress" value="no" />no</label>
          </div>
        </div>
        <div class="field">
          <label>このテストをまた解いてもよいと思いましたか？</label>
          <div class="radio-group">
            <label><input type="radio" name="solveAgain" value="yes" required />yes</label>
            <label><input type="radio" name="solveAgain" value="no" />no</label>
          </div>
        </div>
        <div class="field">
          <label>このテストはコンピューターに解けないと思いますか？</label>
          <div class="radio-group">
            <label><input type="radio" name="computerHard" value="yes" required />yes</label>
            <label><input type="radio" name="computerHard" value="no" />no</label>
          </div>
        </div>
        <div class="field">
          <label for="satisfaction">このテストを解いてみてどの程度満足できましたか？</label>
          <select id="satisfaction" name="satisfaction" required>
            <option value="">選択してください</option>
            <option value="5">5（満足）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（満足していない）</option>
          </select>
        </div>
        <div class="field">
          <label for="postSurveyComment">このテストでわかりにくい文字はありましたか？また、感想があればここにお書き下さい。</label>
          <textarea id="postSurveyComment" name="postSurveyComment" maxlength="200" placeholder="200文字まで"></textarea>
        </div>
        <div style="text-align: center;">
          <button id="postSurveySubmitButton" type="submit">アンケートを送信</button>
        </div>
      </form>
    </div>

    <div id="thank-you">
      <div>ご協力ありがとうございました。</div>
      <button id="restartButton" type="button">最初に戻る</button>
    </div>
  </div>

  <script src="./app-config.js"></script>
  <script src="./model-answers.js"></script>
</body>
</html>
